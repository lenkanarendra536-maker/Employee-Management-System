{% extends "base.html" %}

{% block title %}
Login | Employee Management System
{% endblock %}

{% block css %}

<style>

    body{
        background:#f1f5f9;
    }

    .login-wrapper{
        min-height:80vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .login-card{

        width:100%;
        max-width:420px;

        background:white;

        padding:40px;

        border-radius:20px;

        box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .login-icon{
        width:70px;
        height:70px;
        background:#0f172a;
        color:white;

        display:flex;
        justify-content:center;
        align-items:center;

        border-radius:50%;
        margin:auto;

        font-size:28px;
        margin-bottom:20px;
    }

    .login-title{
        text-align:center;
        font-weight:700;
        color:#0f172a;
        margin-bottom:8px;
    }

    .login-subtitle{
        text-align:center;
        color:#64748b;
        margin-bottom:30px;
        font-size:15px;
    }

    .form-label{
        font-weight:600;
        color:#334155;
    }

    .form-control{
        height:50px;
        border-radius:12px;
        border:1px solid #cbd5e1;
        padding-left:15px;
    }

    .form-control:focus{
        border-color:#2563eb;
        box-shadow:none;
    }

    .btn-login{
        height:50px;
        border-radius:12px;
        font-weight:600;
        font-size:16px;
        margin-top:10px;
    }

    .extra-links{
        text-align:center;
        margin-top:22px;
    }

    .extra-links a{
        color:#2563eb;
        text-decoration:none;
        font-weight:500;
    }

    .extra-links a:hover{
        text-decoration:underline;
    }

    @media(max-width:576px){

        .login-card{
            padding:28px;
        }

    }

</style>

{% endblock %}


{% block content %}

<div class="login-wrapper">

    <div class="login-card">

        <!-- ICON -->

        <div class="login-icon">
            👨‍💼
        </div>

        <!-- TITLE -->

        <h2 class="login-title">
            Admin Login
        </h2>

        <p class="login-subtitle">
            Login to access Employee Management Dashboard
        </p>

        <!-- FORM -->

        <form action="/login" method="POST">

            <!-- EMAIL -->

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input
                    type="email"
                    name="emailid"
                    class="form-control"
                    placeholder="Enter your email"
                    required
                >

            </div>

            <!-- PASSWORD -->

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required
                >

            </div>

            <!-- BUTTON -->

            <button
                type="submit"
                class="btn btn-primary w-100 btn-login"
            >
                Login
            </button>

        </form>

        <!-- LINKS -->

        <div class="extra-links">

            <p class="mb-2">
                <a href="/forgot">
                    Forgot Password?
                </a>
            </p>

            <p>
                <a href="/register">
                    Create New Account
                </a>
            </p>

        </div>

    </div>

</div>

{% endblock %}
