{% extends "base.html" %}

{% block title %}
Reset Password | Employee Management System
{% endblock %}

{% block css %}

<style>

    body{
        background:#f1f5f9;
    }

    .reset-wrapper{
        min-height:80vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .reset-card{
        width:100%;
        max-width:430px;
        background:white;
        padding:40px;
        border-radius:20px;
        box-shadow:0 10px 30px rgba(0,0,0,0.08);
        text-align:center;
    }

    .reset-icon{
        width:75px;
        height:75px;
        background:#0f172a;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        border-radius:50%;
        margin:auto;
        margin-bottom:20px;
        font-size:30px;
    }

    .reset-title{
        font-weight:700;
        color:#0f172a;
        margin-bottom:8px;
    }

    .reset-subtitle{
        color:#64748b;
        margin-bottom:30px;
        font-size:15px;
    }

    .form-label{
        font-weight:600;
        color:#334155;
        text-align:left;
        display:block;
        margin-bottom:8px;
    }

    .form-control{
        height:50px;
        border-radius:12px;
        border:1px solid #cbd5e1;
        padding-left:15px;
    }

    .form-control:focus{
        border-color:#2563eb;
        box-shadow:none;
    }

    .btn-update{
        height:50px;
        border-radius:12px;
        font-weight:600;
        font-size:16px;
        margin-top:10px;
    }

    .back-link{
        margin-top:20px;
        display:inline-block;
        color:#2563eb;
        text-decoration:none;
        font-weight:500;
    }

    .back-link:hover{
        text-decoration:underline;
    }

    @media(max-width:576px){
        .reset-card{
            padding:28px;
        }
    }

</style>

{% endblock %}


{% block content %}

<div class="reset-wrapper">

    <div class="reset-card">

        <div class="reset-icon">
            🔑
        </div>

        <h2 class="reset-title">
            Reset Password
        </h2>

        <p class="reset-subtitle">
            Enter your new password to update your account
        </p>

        {% if msg %}
        <div class="alert alert-danger text-center">
            {{ msg }}
        </div>
        {% endif %}

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    New Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter new password"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100 btn-update"
            >
                Update Password
            </button>

        </form>

        <a href="/login" class="back-link">
            ← Back to Login
        </a>

    </div>

</div>

{% endblock %}
