{% extends "base.html" %}

{% block title %}
Verify OTP | Employee Management System
{% endblock %}

{% block css %}

<style>

    body{
        background:#f1f5f9;
    }

    .otp-wrapper{

        min-height:80vh;

        display:flex;

        justify-content:center;

        align-items:center;

        padding:20px;
    }

    .otp-card{

        width:100%;

        max-width:430px;

        background:white;

        padding:40px;

        border-radius:20px;

        box-shadow:0 10px 30px rgba(0,0,0,0.08);

        text-align:center;
    }

    .otp-icon{

        width:75px;

        height:75px;

        background:#0f172a;

        color:white;

        display:flex;

        justify-content:center;

        align-items:center;

        border-radius:50%;

        margin:auto;

        margin-bottom:20px;

        font-size:30px;
    }

    .otp-title{

        font-weight:700;

        color:#0f172a;

        margin-bottom:8px;
    }

    .otp-subtitle{

        color:#64748b;

        margin-bottom:30px;

        font-size:15px;
    }

    .form-label{

        font-weight:600;

        color:#334155;

        text-align:left;

        display:block;

        margin-bottom:8px;
    }

    .form-control{

        height:50px;

        border-radius:12px;

        border:1px solid #cbd5e1;

        padding-left:15px;
    }

    .form-control:focus{

        border-color:#2563eb;

        box-shadow:none;
    }

    .btn-verify{

        height:50px;

        border-radius:12px;

        font-weight:600;

        font-size:16px;

        margin-top:10px;
    }

    .resend-btn{

        text-decoration:none;

        font-weight:500;

        margin-top:10px;
    }

    .back-link{

        margin-top:20px;

        display:inline-block;

        color:#2563eb;

        text-decoration:none;

        font-weight:500;
    }

    .back-link:hover{
        text-decoration:underline;
    }

    @media(max-width:576px){

        .otp-card{
            padding:28px;
        }

    }

</style>

{% endblock %}


{% block content %}

<div class="otp-wrapper">

    <div class="otp-card">

        <!-- ICON -->

        <div class="otp-icon">
            🔐
        </div>

        <!-- TITLE -->

        <h2 class="otp-title">
            Verify OTP
        </h2>

        <p class="otp-subtitle">
            Enter the OTP sent to your registered email
        </p>

        <!-- ERROR MESSAGE -->

        {% if msg %}

        <div class="alert alert-danger text-center">

            {{ msg }}

        </div>

        {% endif %}

        <!-- FORM -->

        <form method="POST">

            <!-- OTP -->

            <div class="mb-3">

                <label class="form-label">
                    Enter OTP
                </label>

                <input
                    type="text"
                    name="otp"
                    class="form-control"
                    placeholder="Enter OTP"
                    required
                >

            </div>

            <!-- VERIFY BUTTON -->

            <button
                type="submit"
                class="btn btn-primary w-100 btn-verify"
            >
                Verify OTP
            </button>

            <!-- RESEND -->

            <button
                type="submit"
                name="resend"
                value="1"
                class="btn btn-link w-100 resend-btn"
            >
                Didn't receive OTP? Resend
            </button>

        </form>

        <!-- BACK -->

        <a href="/login" class="back-link">
            ← Back to Login
        </a>

    </div>

</div>

{% endblock %}
