<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background-color: rgba(0,0,0,0.9);
        }

        .navbar-brand img {
            height: 40px;
        }

        .nav-link {
            color: white !important;
            margin-right: 10px;
        }

        .nav-link:hover {
            color: #0d6efd !important;
        }

        /* Contact Section */
        .contact-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            padding: 20px;
        }

        .contact-card {
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .contact-card h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .form-control {
            border-radius: 10px;
            height: 45px;
        }

        textarea.form-control {
            height: 100px;
        }

        .btn-send {
            border-radius: 25px;
            font-weight: bold;
            padding: 10px;
        }

        /* Footer */
        footer {
            background-color: rgba(0,0,0,0.9);
            color: #aaa;
            text-align: center;
            padding: 10px 0;
        }

        /* =========================
           RESPONSIVE MEDIA QUERIES
           ========================= */

        /* Tablets */
        @media (max-width: 992px) {
            .nav-link {
                margin-right: 8px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .navbar .container {
                flex-direction: column;
                align-items: flex-start;
            }

            .ms-auto {
                width: 100%;
                margin-top: 10px;
            }

            .nav-link {
                display: block;
                margin: 5px 0;
            }

            h3 {
                font-size: 20px;
                margin-top: 10px;
            }

            .contact-card {
                padding: 20px;
            }
        }

        /* Small Mobile */
        @media (max-width: 480px) {
            .contact-card h2 {
                font-size: 22px;
            }

            .form-control {
                height: 40px;
                font-size: 14px;
            }

            textarea.form-control {
                height: 90px;
            }

            .btn-send {
                font-size: 14px;
                padding: 8px;
            }

            footer {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="logo">
        </a>

        <h3 class="text-white mb-0">Employee Management System</h3>

        <div class="ms-auto">
            <a class="nav-link d-inline" href="/">Home</a>
            <a class="nav-link d-inline" href="/about">About</a>
            <a class="nav-link d-inline" href="/contact">Contact</a>
        </div>
    </div>
</nav>

<!-- 🔷 Contact Form -->
<div class="container contact-container">
    <div class="contact-card">
        <h2>Contact Us</h2>

        <form method="post">
            <input type="text" class="form-control mb-3" placeholder="Full Name" name="name" required>

            <input type="email" class="form-control mb-3" placeholder="Email Address" name="email" required>

            <input type="tel" class="form-control mb-3" placeholder="Phone Number" name="phone" required>

            <textarea class="form-control mb-3" name="message" placeholder="Your Message" required></textarea>

            <button class="btn btn-primary w-100 btn-send">Send Message</button>
        </form>
    </div>
</div>

<!-- 🔷 Footer -->
<footer>
    © 2026 Employee Management System
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
