{% extends "base.html" %}

{% block title %}
Contact Us | Employee Management System
{% endblock %}

{% block css %}

<style>

    body{
        background:#f1f5f9;
    }

    .contact-wrapper{

        min-height:80vh;

        display:flex;

        justify-content:center;

        align-items:center;

        padding:20px;
    }

    .contact-card{

        width:100%;

        max-width:550px;

        background:white;

        padding:40px;

        border-radius:20px;

        box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .contact-icon{

        width:75px;

        height:75px;

        background:#0f172a;

        color:white;

        display:flex;

        justify-content:center;

        align-items:center;

        border-radius:50%;

        margin:auto;

        margin-bottom:20px;

        font-size:30px;
    }

    .contact-title{

        text-align:center;

        font-weight:700;

        color:#0f172a;

        margin-bottom:8px;
    }

    .contact-subtitle{

        text-align:center;

        color:#64748b;

        margin-bottom:30px;

        font-size:15px;
    }

    .form-label{

        font-weight:600;

        color:#334155;
    }

    .form-control{

        border-radius:12px;

        border:1px solid #cbd5e1;

        padding:12px 15px;
    }

    .form-control:focus{

        border-color:#2563eb;

        box-shadow:none;
    }

    textarea.form-control{

        min-height:120px;

        resize:none;
    }

    .btn-send{

        height:50px;

        border-radius:12px;

        font-weight:600;

        font-size:16px;

        margin-top:10px;
    }

    @media(max-width:576px){

        .contact-card{
            padding:28px;
        }

    }

</style>

{% endblock %}


{% block content %}

<div class="contact-wrapper">

    <div class="contact-card">

        <!-- ICON -->

        <div class="contact-icon">
            📩
        </div>

        <!-- TITLE -->

        <h2 class="contact-title">
            Contact Us
        </h2>

        <p class="contact-subtitle">
            Have questions? Send us your message
        </p>

        <!-- FORM -->

        <form method="POST">

            <!-- NAME -->

            <div class="mb-3">

                <label class="form-label">
                    Full Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter your full name"
                    name="name"
                    required
                >

            </div>

            <!-- EMAIL -->

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input
                    type="email"
                    class="form-control"
                    placeholder="Enter your email"
                    name="email"
                    required
                >

            </div>

            <!-- PHONE -->

            <div class="mb-3">

                <label class="form-label">
                    Phone Number
                </label>

                <input
                    type="tel"
                    class="form-control"
                    placeholder="Enter your phone number"
                    name="phone"
                    required
                >

            </div>

            <!-- MESSAGE -->

            <div class="mb-3">

                <label class="form-label">
                    Message
                </label>

                <textarea
                    class="form-control"
                    name="message"
                    placeholder="Write your message here..."
                    required
                ></textarea>

            </div>

            <!-- BUTTON -->

            <button
                type="submit"
                class="btn btn-primary w-100 btn-send"
            >
                Send Message
            </button>

        </form>

    </div>

</div>

{% endblock %}
