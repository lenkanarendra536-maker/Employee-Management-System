<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee | EMS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #0f172a, #1e3a8a, #0f172a);
            color: white;
        }

        /* Navbar */
        .navbar {
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .navbar-brand img {
            height: 40px;
        }

        /* Center container */
        .form-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
        }

        /* Glass Card */
        .glass-card {
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 18px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .glass-card:hover {
            transform: translateY(-3px);
        }

        .glass-card h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* Inputs */
        .form-control {
            height: 45px;
            border-radius: 12px;
            border: none;
        }

        .form-control:focus {
            box-shadow: 0 0 10px rgba(13,110,253,0.5);
        }

        /* Button */
        .btn-submit {
            border-radius: 30px;
            padding: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-submit:hover {
            transform: scale(1.03);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            color: #aaa;
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="/dashboard">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="me-2">
            EMS
        </a>

        <div class="ms-auto d-flex gap-2">
            <a href="/dashboard" class="btn btn-outline-warning btn-sm">Dashboard</a>
            <a href="/view" class="btn btn-outline-light btn-sm">View</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>

    </div>
</nav>

<!-- 🔷 Form -->
<div class="container form-wrapper">

    <div class="glass-card">

        <h2>Add Employee</h2>

        <form action="/add" method="post">

            <input type="text" class="form-control mb-3" placeholder="Employee ID" name="eid" required>

            <input type="text" class="form-control mb-3" placeholder="Employee Name" name="ename" required>

            <input type="text" class="form-control mb-3" placeholder="Department" name="edept" required>

            <input type="number" class="form-control mb-3" placeholder="Salary" name="esalary" required>

            <input type="tel" class="form-control mb-3" placeholder="Phone Number" name="ephone" required>

            <button class="btn btn-success w-100 btn-submit">Add Employee</button>

        </form>

    </div>

</div>

<!-- 🔷 Footer -->
<footer>
    © 2026 Employee Management System | Enterprise Panel
</footer>

</body>
</html>
