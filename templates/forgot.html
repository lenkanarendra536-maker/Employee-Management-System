<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1556761175-4b46a572b786');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            background-color: rgba(0,0,0,0.85);
        }

        .navbar-brand img {
            height: 40px;
        }

        .nav-link {
            color: white !important;
            margin-right: 10px;
        }

        .nav-link:hover {
            color: #0d6efd !important;
        }

        /* Center Box */
        .container-box {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-box {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
        }

        .card-box h2 {
            margin-bottom: 20px;
            font-weight: bold;
        }

        .form-control {
            height: 45px;
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 25px;
            padding: 10px;
            font-weight: bold;
        }

        .back-link {
            margin-top: 15px;
            display: block;
            color: #ddd;
            text-decoration: none;
        }

        .back-link:hover {
            color: #fff;
        }

        /* Footer */
        footer {
            background-color: rgba(0,0,0,0.85);
            color: #aaa;
            text-align: center;
            padding: 10px 0;
        }

        /* =========================
           RESPONSIVE MEDIA QUERIES
           ========================= */

        /* Tablets */
        @media (max-width: 992px) {
            .card-box {
                padding: 25px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .navbar .container {
                flex-direction: column;
                align-items: flex-start;
            }

            .ms-auto {
                width: 100%;
                margin-top: 10px;
            }

            .nav-link {
                display: block;
                margin: 5px 0;
            }

            .card-box {
                max-width: 100%;
                padding: 20px;
            }

            h3.text-white {
                font-size: 18px;
                margin-top: 10px;
            }
        }

        /* Small Mobile */
        @media (max-width: 480px) {
            .card-box h2 {
                font-size: 22px;
            }

            .form-control {
                height: 40px;
                font-size: 14px;
            }

            .btn-custom {
                font-size: 14px;
                padding: 8px;
            }

            .back-link {
                font-size: 13px;
            }

            footer {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="logo">
        </a>

        <h3 class="text-white mb-0">Employee Management System</h3>

        <div class="ms-auto">
            <a class="nav-link d-inline" href="/">Home</a>
            <a class="nav-link d-inline" href="/about">About</a>
            <a class="nav-link d-inline" href="/contact">Contact</a>
        </div>
    </div>
</nav>

<!-- 🔷 Forgot Password Section -->
<div class="container container-box">
    <div class="card-box">
        <h2>Forgot Password</h2>

        <form method="POST">
            <input type="email" name="email" class="form-control mb-3" placeholder="Enter your email" required>

            <button type="submit" class="btn btn-primary w-100 btn-custom">
                Send OTP
            </button>
        </form>

        <a href="/" class="back-link">← Back to Login</a>
    </div>
</div>

<!-- 🔷 Footer -->
<footer>
    © 2026 Employee Management System
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
