<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Employee System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .navbar-brand img {
            height: 40px;
        }

        .nav-link {
            color: white !important;
            margin-right: 10px;
        }

        .nav-link:hover {
            color: #0d6efd !important;
        }

        /* Login Card */
        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .login-card h2 {
            font-weight: bold;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 10px;
            height: 45px;
        }

        .btn-login {
            border-radius: 25px;
            font-weight: bold;
            padding: 10px;
        }

        a {
            color: #ddd;
            text-decoration: none;
        }

        a:hover {
            color: #fff;
        }

        /* Footer */
        footer {
            background-color: rgba(0,0,0,0.8);
            color: #aaa;
            text-align: center;
            padding: 10px 0;
        }

        /* =========================
           RESPONSIVE MEDIA QUERIES
           ========================= */

        /* Tablets */
        @media (max-width: 992px) {
            .login-card {
                padding: 25px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .navbar .container {
                flex-direction: column;
                align-items: flex-start;
            }

            .ms-auto {
                width: 100%;
                margin-top: 10px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .login-card {
                max-width: 100%;
                padding: 20px;
            }

            h3.text-white {
                font-size: 18px;
                margin-top: 10px;
            }
        }

        /* Small Mobile */
        @media (max-width: 480px) {
            .login-card h2 {
                font-size: 22px;
            }

            .form-control {
                height: 40px;
                font-size: 14px;
            }

            .btn-login {
                font-size: 14px;
                padding: 8px;
            }

            footer {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="logo">
        </a>

        <h3 class="text-white mb-0">Employee Management System</h3>

        <div class="ms-auto d-flex gap-4">
            <a class="nav-link d-inline" href="/">Home</a>
            <a class="nav-link d-inline" href="/about">About</a>
            <a class="nav-link d-inline" href="/contact">Contact</a>
        </div>
    </div>
</nav>

<!-- 🔷 Login Section -->
<div class="container login-container">
    <div class="login-card text-center">
        <h2>Welcome Back</h2>

        <form action="/login" method="post">
            <input type="text" class="form-control mb-3" placeholder="Username" name="username" required>

            <input type="password" class="form-control mb-3" placeholder="Password" name="password" required>

            <button class="btn btn-primary w-100 btn-login">Login</button>

            <div class="mt-3">
                <a href="/forgot">Forgot Password?</a>
            </div>

            <div class="mt-2">
                <a href="/register">Don't have an account? Register</a>
            </div>
        </form>
    </div>
</div>

<!-- 🔷 Footer -->
<footer>
    © 2026 Employee Management System
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
