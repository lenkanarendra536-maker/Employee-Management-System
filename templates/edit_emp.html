<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #2c3e50, #4ca1af);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background-color: rgba(0, 0, 0, 0.9);
        }

        .navbar-brand img {
            height: 40px;
        }

        .nav-link {
            color: white !important;
            margin-right: 10px;
        }

        .nav-link:hover {
            color: #0d6efd !important;
        }

        /* Form Section */
        .form-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            padding: 20px;
        }

        .form-card {
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 15px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .form-card h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .form-control {
            border-radius: 10px;
            height: 45px;
        }

        .btn-update {
            border-radius: 25px;
            font-weight: bold;
            padding: 10px;
        }

        /* Footer */
        footer {
            background-color: rgba(0, 0, 0, 0.9);
            color: #aaa;
            text-align: center;
            padding: 10px 0;
        }

        /* =========================
           RESPONSIVE MEDIA QUERIES
           ========================= */

        /* Tablets */
        @media (max-width: 992px) {
            .form-card {
                padding: 25px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .navbar .container {
                flex-direction: column;
                align-items: flex-start;
            }

            .ms-auto {
                width: 100%;
                margin-top: 10px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .form-card {
                max-width: 100%;
                padding: 20px;
            }

            h3.text-white {
                font-size: 18px;
                margin-top: 10px;
            }
        }

        /* Small Mobile */
        @media (max-width: 480px) {
            .form-card h2 {
                font-size: 22px;
            }

            .form-control {
                height: 40px;
                font-size: 14px;
            }

            .btn-update {
                font-size: 14px;
                padding: 8px;
            }

            footer {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <!-- 🔷 Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="logo">
            </a>

            <h3 class="text-white mb-0">Employee Management System</h3>

            <div class="ms-auto">
                <a href="/dashboard" class="btn btn-outline-info">Dashboard</a>
                <a href="/add" class="btn btn-outline-light me-2">Add Employee</a>
                <a href="/logout" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <!-- 🔷 Edit Form -->
    <div class="container form-container">
        <div class="form-card">
            <h2>Edit Employee</h2>

            <form action="/update" method="post">

                <input type="text" class="form-control mb-3" name="eid" value="{{ e[0] }}" readonly>

                <input type="text" class="form-control mb-3" name="ename" value="{{ e[1] }}" required>

                <input type="text" class="form-control mb-3" name="edept" value="{{ e[2] }}" required>

                <input type="number" class="form-control mb-3" name="esalary" value="{{ e[3] }}" required>

                <input type="tel" class="form-control mb-3" name="ephone" value="{{ e[4] }}" required>

                <button type="submit" class="btn btn-primary w-100 btn-update">
                    Update Employee
                </button>

            </form>
        </div>
    </div>

    <!-- 🔷 Footer -->
    <footer>
        © 2026 Employee Management System
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
