{% extends "base.html" %}

{% block title %}
Add Employee | Employee Management System
{% endblock %}

{% block css %}

<style>

    body{
        background:#f1f5f9;
    }

    .form-wrapper{

        min-height:80vh;

        display:flex;

        justify-content:center;

        align-items:center;

        padding:20px;
    }

    .employee-card{

        width:100%;

        max-width:500px;

        background:white;

        padding:40px;

        border-radius:20px;

        box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .employee-icon{

        width:75px;

        height:75px;

        background:#0f172a;

        color:white;

        display:flex;

        justify-content:center;

        align-items:center;

        border-radius:50%;

        margin:auto;

        margin-bottom:20px;

        font-size:30px;
    }

    .employee-title{

        text-align:center;

        font-weight:700;

        color:#0f172a;

        margin-bottom:8px;
    }

    .employee-subtitle{

        text-align:center;

        color:#64748b;

        margin-bottom:30px;

        font-size:15px;
    }

    .form-label{

        font-weight:600;

        color:#334155;
    }

    .form-control{

        height:50px;

        border-radius:12px;

        border:1px solid #cbd5e1;
    }

    .form-control:focus{

        border-color:#2563eb;

        box-shadow:none;
    }

    .btn-submit{

        height:50px;

        border-radius:12px;

        font-weight:600;

        font-size:16px;

        margin-top:10px;
    }

    @media(max-width:576px){

        .employee-card{
            padding:28px;
        }

    }

</style>

{% endblock %}


{% block content %}

<div class="form-wrapper">

    <div class="employee-card">

        <!-- ICON -->

        <div class="employee-icon">
            👨‍💼
        </div>

        <!-- TITLE -->

        <h2 class="employee-title">
            Add Employee
        </h2>

        <p class="employee-subtitle">
            Enter employee details to add records
        </p>

        <!-- FORM -->

        <form action="/add" method="POST">

            <!-- EMPLOYEE ID -->

            <div class="mb-3">

                <label class="form-label">
                    Employee ID
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter employee ID"
                    name="eid"
                    required
                >

            </div>

            <!-- EMPLOYEE NAME -->

            <div class="mb-3">

                <label class="form-label">
                    Employee Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter employee name"
                    name="ename"
                    required
                >

            </div>

            <!-- DEPARTMENT -->

            <div class="mb-3">

                <label class="form-label">
                    Department
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter department"
                    name="edept"
                    required
                >

            </div>

            <!-- SALARY -->

            <div class="mb-3">

                <label class="form-label">
                    Salary
                </label>

                <input
                    type="number"
                    class="form-control"
                    placeholder="Enter salary"
                    name="esalary"
                    required
                >

            </div>

            <!-- PHONE -->

            <div class="mb-3">

                <label class="form-label">
                    Phone Number
                </label>

                <input
                    type="tel"
                    class="form-control"
                    placeholder="Enter phone number"
                    name="ephone"
                    required
                >

            </div>

            <!-- BUTTON -->

            <button
                type="submit"
                class="btn btn-success w-100 btn-submit"
            >
                Add Employee
            </button>

        </form>

    </div>

</div>

{% endblock %}
