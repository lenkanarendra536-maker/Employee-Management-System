{% extends "base.html" %}

{% block title %}
Forgot Password | Employee Management System
{% endblock %}

{% block css %}

<style>

    body{
        background:#f1f5f9;
    }

    .forgot-wrapper{

        min-height:80vh;

        display:flex;

        justify-content:center;

        align-items:center;

        padding:20px;
    }

    .forgot-card{

        width:100%;

        max-width:430px;

        background:white;

        padding:40px;

        border-radius:20px;

        box-shadow:0 10px 30px rgba(0,0,0,0.08);

        text-align:center;
    }

    .forgot-icon{

        width:75px;

        height:75px;

        background:#0f172a;

        color:white;

        display:flex;

        justify-content:center;

        align-items:center;

        border-radius:50%;

        margin:auto;

        margin-bottom:20px;

        font-size:30px;
    }

    .forgot-title{

        font-weight:700;

        color:#0f172a;

        margin-bottom:8px;
    }

    .forgot-subtitle{

        color:#64748b;

        margin-bottom:30px;

        font-size:15px;
    }

    .form-label{

        font-weight:600;

        color:#334155;

        text-align:left;

        display:block;

        margin-bottom:8px;
    }

    .form-control{

        height:50px;

        border-radius:12px;

        border:1px solid #cbd5e1;

        padding-left:15px;
    }

    .form-control:focus{

        border-color:#2563eb;

        box-shadow:none;
    }

    .btn-send{

        height:50px;

        border-radius:12px;

        font-weight:600;

        font-size:16px;

        margin-top:10px;
    }

    .back-link{

        margin-top:20px;

        display:inline-block;

        color:#2563eb;

        text-decoration:none;

        font-weight:500;
    }

    .back-link:hover{
        text-decoration:underline;
    }

    @media(max-width:576px){

        .forgot-card{
            padding:28px;
        }

    }

</style>

{% endblock %}


{% block content %}

<div class="forgot-wrapper">

    <div class="forgot-card">

        <!-- ICON -->

        <div class="forgot-icon">
            🔒
        </div>

        <!-- TITLE -->

        <h2 class="forgot-title">
            Forgot Password
        </h2>

        <p class="forgot-subtitle">
            Enter your registered email to receive OTP
        </p>

        <!-- FORM -->

        <form method="POST">

            <!-- EMAIL -->

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required
                >

            </div>

            <!-- BUTTON -->

            <button
                type="submit"
                class="btn btn-primary w-100 btn-send"
            >
                Send OTP
            </button>

        </form>

        <!-- BACK -->

        <a href="/login" class="back-link">
            ← Back to Login
        </a>

    </div>

</div>

{% endblock %}
