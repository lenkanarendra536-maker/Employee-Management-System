{% extends "base.html" %}

{% block title %}
Edit Employee | Employee Management System
{% endblock %}

{% block css %}

<style>

    body{
        background:#f1f5f9;
    }

    .edit-wrapper{

        min-height:80vh;

        display:flex;

        justify-content:center;

        align-items:center;

        padding:20px;
    }

    .edit-card{

        width:100%;

        max-width:500px;

        background:white;

        padding:40px;

        border-radius:20px;

        box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .edit-icon{

        width:75px;

        height:75px;

        background:#0f172a;

        color:white;

        display:flex;

        justify-content:center;

        align-items:center;

        border-radius:50%;

        margin:auto;

        margin-bottom:20px;

        font-size:30px;
    }

    .edit-title{

        text-align:center;

        font-weight:700;

        color:#0f172a;

        margin-bottom:8px;
    }

    .edit-subtitle{

        text-align:center;

        color:#64748b;

        margin-bottom:30px;

        font-size:15px;
    }

    .form-label{

        font-weight:600;

        color:#334155;
    }

    .form-control{

        height:50px;

        border-radius:12px;

        border:1px solid #cbd5e1;
    }

    .form-control:focus{

        border-color:#2563eb;

        box-shadow:none;
    }

    .readonly-input{

        background:#e2e8f0 !important;

        cursor:not-allowed;
    }

    .btn-update{

        height:50px;

        border-radius:12px;

        font-weight:600;

        font-size:16px;

        margin-top:10px;
    }

    @media(max-width:576px){

        .edit-card{
            padding:28px;
        }

    }

</style>

{% endblock %}


{% block content %}

<div class="edit-wrapper">

    <div class="edit-card">

        <!-- ICON -->

        <div class="edit-icon">
            ✏️
        </div>

        <!-- TITLE -->

        <h2 class="edit-title">
            Edit Employee
        </h2>

        <p class="edit-subtitle">
            Update employee details and save changes
        </p>

        <!-- FORM -->

        <form action="/update" method="POST">

            <!-- EMPLOYEE ID -->

            <div class="mb-3">

                <label class="form-label">
                    Employee ID
                </label>

                <input
                    type="text"
                    class="form-control readonly-input"
                    name="eid"
                    value="{{ e[0] }}"
                    readonly
                >

            </div>

            <!-- EMPLOYEE NAME -->

            <div class="mb-3">

                <label class="form-label">
                    Employee Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="ename"
                    value="{{ e[1] }}"
                    required
                >

            </div>

            <!-- DEPARTMENT -->

            <div class="mb-3">

                <label class="form-label">
                    Department
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="edept"
                    value="{{ e[2] }}"
                    required
                >

            </div>

            <!-- SALARY -->

            <div class="mb-3">

                <label class="form-label">
                    Salary
                </label>

                <input
                    type="number"
                    class="form-control"
                    name="esalary"
                    value="{{ e[3] }}"
                    required
                >

            </div>

            <!-- PHONE -->

            <div class="mb-3">

                <label class="form-label">
                    Phone Number
                </label>

                <input
                    type="tel"
                    class="form-control"
                    name="ephone"
                    value="{{ e[4] }}"
                    required
                >

            </div>

            <!-- BUTTON -->

            <button
                type="submit"
                class="btn btn-primary w-100 btn-update"
            >
                Update Employee
            </button>

        </form>

    </div>

</div>

{% endblock %}
