{% extends "base.html" %}

{% block title %}
Register | Employee Management System
{% endblock %}

{% block css %}

<style>

    body{
        background:#f1f5f9;
    }

    .register-wrapper{
        min-height:80vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .register-card{

        width:100%;
        max-width:450px;

        background:white;

        padding:40px;

        border-radius:20px;

        box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .register-icon{

        width:75px;
        height:75px;

        background:#0f172a;
        color:white;

        display:flex;
        justify-content:center;
        align-items:center;

        border-radius:50%;

        margin:auto;
        margin-bottom:20px;

        font-size:30px;
    }

    .register-title{
        text-align:center;
        font-weight:700;
        color:#0f172a;
        margin-bottom:8px;
    }

    .register-subtitle{
        text-align:center;
        color:#64748b;
        margin-bottom:30px;
        font-size:15px;
    }

    .form-label{
        font-weight:600;
        color:#334155;
    }

    .form-control,
    .form-select{

        height:50px;

        border-radius:12px;

        border:1px solid #cbd5e1;
    }

    .form-control:focus,
    .form-select:focus{

        border-color:#2563eb;
        box-shadow:none;
    }

    .btn-register{

        height:50px;

        border-radius:12px;

        font-weight:600;

        font-size:16px;

        margin-top:10px;
    }

    .login-link{
        text-align:center;
        margin-top:20px;
    }

    .login-link a{
        color:#2563eb;
        text-decoration:none;
        font-weight:500;
    }

    .login-link a:hover{
        text-decoration:underline;
    }

    @media(max-width:576px){

        .register-card{
            padding:28px;
        }

    }

</style>

{% endblock %}


{% block content %}

<div class="register-wrapper">

    <div class="register-card">

        <!-- ICON -->

        <div class="register-icon">
            👨‍💼
        </div>

        <!-- TITLE -->

        <h2 class="register-title">
            Create Account
        </h2>

        <p class="register-subtitle">
            Register to manage employees and dashboard
        </p>

        <!-- FORM -->

        <form action="/register" method="POST">

            <!-- NAME -->

            <div class="mb-3">

                <label class="form-label">
                    Full Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter full name"
                    name="name"
                    required
                >

            </div>

            <!-- EMAIL -->

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input
                    type="email"
                    class="form-control"
                    placeholder="Enter email address"
                    name="emailid"
                    required
                >

            </div>

            <!-- USERNAME -->

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter username"
                    name="username"
                    required
                >

            </div>

            <!-- PASSWORD -->

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    class="form-control"
                    placeholder="Enter password"
                    name="password"
                    required
                >

            </div>

            <!-- ROLE -->

            <div class="mb-3">

                <label class="form-label">
                    Select Role
                </label>

                <select
                    class="form-select"
                    name="role"
                    required
                >

                    <option value="">
                        Choose Role
                    </option>

                    <option value="admin">
                        Admin
                    </option>

                    <option value="user">
                        User
                    </option>

                </select>

            </div>

            <!-- BUTTON -->

            <button
                type="submit"
                class="btn btn-primary w-100 btn-register"
            >
                Register
            </button>

        </form>

        <!-- LOGIN LINK -->

        <div class="login-link">

            <a href="/login">
                Already have an account? Login
            </a>

        </div>

    </div>

</div>

{% endblock %}
