<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Employee System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #1e3a8a, #0f172a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-brand img {
            height: 40px;
        }

        .brand-text {
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .nav-link {
            color: #ddd !important;
            margin-left: 15px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #0d6efd !important;
        }

        /* Center */
        .register-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Card */
        .register-card {
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 18px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .register-card h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 20px;
            color: #222;
        }

        /* Inputs */
        .form-control, .form-select {
            border-radius: 12px;
            height: 48px;
        }

        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 10px rgba(13,110,253,0.3);
            border-color: #0d6efd;
        }

        /* Button */
        .btn-register {
            border-radius: 30px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13,110,253,0.4);
        }

        /* Login link */
        .login-link {
            text-align: center;
            margin-top: 15px;
        }

        .login-link a {
            text-decoration: none;
            color: #0d6efd;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            background: rgba(0,0,0,0.85);
            color: #aaa;
            text-align: center;
            padding: 10px;
        }

        /* =========================
           RESPONSIVE MEDIA QUERIES
           ========================= */

        /* Tablets */
        @media (max-width: 992px) {
            .register-card {
                padding: 28px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .navbar .container {
                flex-direction: column;
                align-items: flex-start;
            }

            .ms-auto {
                width: 100%;
                margin-top: 10px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .register-card {
                max-width: 100%;
                padding: 22px;
            }

            .brand-text {
                font-size: 16px;
            }
        }

        /* Small Mobile */
        @media (max-width: 480px) {
            .register-card h2 {
                font-size: 22px;
            }

            .form-control, .form-select {
                height: 42px;
                font-size: 14px;
            }

            .btn-register {
                font-size: 14px;
                padding: 10px;
            }

            footer {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">

        <a class="navbar-brand" href="/">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="logo">
            <span class="brand-text">Employee System</span>
        </a>

        <div class="ms-auto">
            <a class="nav-link d-inline" href="/">Home</a>
            <a class="nav-link d-inline" href="/about">About</a>
            <a class="nav-link d-inline" href="/contact">Contact</a>
        </div>

    </div>
</nav>

<!-- 🔷 Register Form -->
<div class="container register-container">

    <div class="register-card">

        <h2>Create Account</h2>

        <form action="/register" method="post">

            <input type="text" class="form-control mb-3" placeholder="Full Name" name="name" required>

            <input type="email" class="form-control mb-3" placeholder="Email Address" name="emailid" required>

            <input type="text" class="form-control mb-3" placeholder="Username" name="username" required>

            <input type="password" class="form-control mb-3" placeholder="Password" name="password" required>

            <select class="form-select mb-3" name="role">
                <option value="">Select Role</option>
                <option value="admin">Admin</option>
                <option value="user">User</option>
            </select>

            <button class="btn btn-primary w-100 btn-register">Register</button>

        </form>

        <div class="login-link">
            <a href="/login">Already have an account? Login</a>
        </div>

    </div>

</div>

<!-- 🔷 Footer -->
<footer>
    © 2026 Employee Management System
</footer>

</body>
</html>
